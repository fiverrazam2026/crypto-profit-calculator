<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Profit & Capital Gains Tax Modeler</title>
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: #141b29;
            --primary: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #222f47;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.05);
            margin-bottom: 80px;
        }

        h1 {
            font-size: 22px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            min-height: 60px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            overflow: hidden;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 14px;
            color: var(--primary);
            font-weight: bold;
        }

        .pct-symbol {
            position: absolute;
            right: 14px;
            color: var(--text-muted);
        }

        input[type="number"] {
            width: 100%;
            background: #080c12;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 12px 12px 30px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="number"].pct-input {
            padding-right: 35px;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
        }

        .results-box {
            background: #080c12;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-main);
        }

        .result-value {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .result-value.tax-loss {
            color: #ef4444;
        }

        .result-value.highlight {
            color: #22c55e;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        #sticky-bottom-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #080c12;
            border-top: 1px solid var(--border-color);
            padding: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Crypto Capital Profits</h1>
        <p class="subtitle">Calculate raw portfolio profits alongside automated capital gains tax tiers</p>

        <div id="monetag-banner-top" class="ad-container"></div>

        <div class="input-group">
            <label for="capital-invested">Total Initial Cash Capital Invested</label>
            <div class="input-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="capital-invested" value="1000" oninput="calculateCryptoProfit()">
            </div>
        </div>

        <div class="input-group">
            <label for="asset-multiplier">Target Growth Multiplier (e.g., 2.5x, 5x, 10x)</label>
            <div class="input-wrapper">
                <span class="currency-symbol">x</span>
                <input type="number" id="asset-multiplier" value="3.5" step="0.1" oninput="calculateCryptoProfit()">
            </div>
        </div>

        <div class="input-group">
            <label for="gains-tax">Capital Gains Tax Bracket Rate</label>
            <div class="input-wrapper">
                <span class="currency-symbol"></span>
                <input type="number" id="gains-tax" class="pct-input" value="15" oninput="calculateCryptoProfit()">
                <span class="pct-symbol">%</span>
            </div>
        </div>

        <div class="results-box">
            <div class="result-row">
                <span class="result-label">Gross Exit Target Value:</span>
                <span class="result-value" id="gross-exit">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">Raw Profit Earnings:</span>
                <span class="result-value" id="raw-earnings" style="color: var(--primary);">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">Estimated Government Tax Holdback:</span>
                <span class="result-value tax-loss" id="tax-withholding">$0.00</span>
            </div>
            <div class="result-row">
                <span class="result-label">Net Take-Home Capital Profit:</span>
                <span class="result-value highlight" id="net-crypto-payout">$0.00</span>
            </div>
        </div>
    </div>

    <div id="sticky-bottom-container">
        <div id="monetag-banner-bottom" style="width:100%; max-width:468px; min-height:60px; text-align:center;"></div>
    </div>

    <script>
        function calculateCryptoProfit() {
            const capital = parseFloat(document.getElementById('capital-invested').value) || 0;
            const multiplier = parseFloat(document.getElementById('asset-multiplier').value) || 0;
            const taxPct = parseFloat(document.getElementById('gains-tax').value) || 0;

            const grossExit = capital * multiplier;
            const rawEarnings = grossExit - capital;
            
            let taxWithholding = 0;
            if (rawEarnings > 0) {
                taxWithholding = rawEarnings * (taxPct / 100);
            }
            
            const netCryptoPayout = rawEarnings - taxWithholding;

            document.getElementById('gross-exit').innerText = "$" + grossExit.toFixed(2);
            document.getElementById('raw-earnings').innerText = rawEarnings > 0 ? "$" + rawEarnings.toFixed(2) : "$0.00";
            document.getElementById('tax-withholding').innerText = "$" + taxWithholding.toFixed(2);
            document.getElementById('net-crypto-payout').innerText = netCryptoPayout > 0 ? "$" + netCryptoPayout.toFixed(2) : "$0.00";
        }
        window.onload = function() { calculateCryptoProfit(); };
    </script>

    <script type="text/javascript">
        (function(s,u,z,p){s.src=u;s.setAttribute('data-zone',z);p.appendChild(s);})(document.createElement('script'),'https://zovidree.com||document.documentElement);
    </script>
    <script type="text/javascript">
        (function(s,u,z,p){s.src=u;s.setAttribute('data-zone',z);p.appendChild(s);})(document.createElement('script'),'https://zovidree.com||document.documentElement);
    </script>
</body>
</html>
